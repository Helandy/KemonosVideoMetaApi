spring.application.name=video-meta-api
spring.autoconfigure.exclude=org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlite:./dataTest/video-meta.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
app.statistics.datasource.url=${APP_STATISTICS_DATASOURCE_URL:jdbc:sqlite:./dataTest/video-meta-statistics.db}
app.statistics.datasource.driver-class-name=${APP_STATISTICS_DATASOURCE_DRIVER_CLASS_NAME:org.sqlite.JDBC}
app.source-error-log.datasource.url=${APP_SOURCE_ERROR_LOG_DATASOURCE_URL:jdbc:sqlite:./dataTest/video-meta-source-errors.db}
app.source-error-log.datasource.driver-class-name=${APP_SOURCE_ERROR_LOG_DATASOURCE_DRIVER_CLASS_NAME:org.sqlite.JDBC}
app.source-error-log.retry.initial-delay-millis=${APP_SOURCE_ERROR_LOG_RETRY_INITIAL_DELAY_MILLIS:30000}
app.source-error-log.retry.fixed-delay-millis=${APP_SOURCE_ERROR_LOG_RETRY_FIXED_DELAY_MILLIS:30000}
app.source-error-log.retry.batch-size=${APP_SOURCE_ERROR_LOG_RETRY_BATCH_SIZE:10}
app.source-error-log.retry.max-retary=${APP_SOURCE_ERROR_LOG_RETRY_MAX_RETARY:3}
app.rate-limit.max-requests=${APP_RATE_LIMIT_MAX_REQUESTS:60}
app.rate-limit.window-seconds=${APP_RATE_LIMIT_WINDOW_SECONDS:10}
app.source.max-concurrent-requests=${APP_SOURCE_MAX_CONCURRENT_REQUESTS:4}
app.inspect.max-concurrent-requests-per-endpoint=${APP_INSPECT_MAX_CONCURRENT_REQUESTS_PER_ENDPOINT:${APP_SOURCE_MAX_CONCURRENT_REQUESTS:4}}
# Maximum number of concurrent /api/file/info requests.
app.inspect.file.max-concurrent-requests=4
# Maximum number of concurrent /api/video/info requests.
app.inspect.video.max-concurrent-requests=6
# Maximum number of queued inspect requests allowed per client/IP.
app.inspect.max-queued-requests-per-user=60
app.thumbnail.root=${APP_THUMBNAIL_ROOT:./dataTest/thumbnail}
app.thumbnail.generation-timeout-seconds=${APP_THUMBNAIL_GENERATION_TIMEOUT_SECONDS:30}
# Maximum number of simultaneous thumbnail generation pipelines.
app.thumbnail.max-concurrent-generations=3
# Number of worker threads used by a single ffmpeg process.
app.thumbnail.ffmpeg-threads=2
app.thumbnail.scale-flags=${APP_THUMBNAIL_SCALE_FLAGS:bicublin}
app.thumbnail.webp-compression-level=${APP_THUMBNAIL_WEBP_COMPRESSION_LEVEL:4}
app.admin.key.path=${APP_ADMIN_KEY_PATH:./dataTest/.admin.key}
app.admin.max-failed-attempts=${APP_ADMIN_MAX_FAILED_ATTEMPTS:10}
app.admin.ban-minutes=${APP_ADMIN_BAN_MINUTES:60}
